<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GREEN-API</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 32px;
            color: #00d09c;
        }

        .section {
            background-color: #252525;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 14px;
            color: #888;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
            font-size: 14px;
        }

        .input-group input,
        .input-group textarea {
            width: 100%;
            padding: 12px;
            background-color: #333;
            border: 1px solid #444;
            border-radius: 4px;
            color: #fff;
            font-size: 14px;
        }

        .input-group input:focus,
        .input-group textarea:focus {
            outline: none;
            border-color: #00d09c;
        }

        .buttons-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 20px;
            background-color: #00d09c;
            color: #000;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background-color: #00b386;
        }

        .form-container {
            display: none;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #444;
        }

        .form-container.active {
            display: block;
        }

        .form-container .btn {
            margin-top: 10px;
        }

        .output-container textarea {
            width: 100%;
            height: 200px;
            background-color: #333;
            border: 1px solid #444;
            border-radius: 4px;
            color: #fff;
            font-size: 13px;
            font-family: 'Courier New', monospace;
            padding: 12px;
            resize: vertical;
        }

        .output-container textarea:focus {
            outline: none;
            border-color: #00d09c;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>GREEN-API</h1>
        </div>

        <div class="section">
            <div class="section-title">Параметры подключения</div>
            <div class="input-group">
                <label for="idInstance">Instance ID</label>
                <input type="text" id="idInstance" placeholder="Введите idInstance">
            </div>
            <div class="input-group">
                <label for="apiTokenInstance">Instance Api Token</label>
                <input type="text" id="apiTokenInstance" placeholder="Введите ApiTokenInstance">
            </div>
        </div>

        <div class="section">
            <div class="section-title">Методы</div>
            <div class="buttons-row">
                <button class="btn" onclick="callGetSettings()">getSettings</button>
                <button class="btn" onclick="callGetStateInstance()">getStateInstance</button>
                <button class="btn" onclick="showSendMessageForm()">sendMessage</button>
                <button class="btn" onclick="showSendFileByUrlForm()">sendFileByUrl</button>
            </div>

            <div id="sendMessageForm" class="form-container">
                <div class="input-group">
                    <label for="messagePhone">Номер телефона</label>
                    <input type="text" id="messagePhone" placeholder="Введите номер телефона">
                </div>
                <div class="input-group">
                    <label for="messageText">Сообщение</label>
                    <textarea id="messageText" rows="3" placeholder="Введите текст сообщения"></textarea>
                </div>
                <button class="btn" onclick="callSendMessage()">Отправить</button>
            </div>

            <div id="sendFileByUrlForm" class="form-container">
                <div class="input-group">
                    <label for="filePhone">Номер телефона</label>
                    <input type="text" id="filePhone" placeholder="Введите номер телефона">
                </div>
                <div class="input-group">
                    <label for="fileUrl">URL файла</label>
                    <input type="text" id="fileUrl" placeholder="Введите URL файла">
                </div>
                <div class="input-group">
                    <label for="fileName">Имя файла</label>
                    <input type="text" id="fileName" placeholder="Введите имя файла">
                </div>
                <button class="btn" onclick="callSendFileByUrl()">Отправить</button>
            </div>
        </div>

        <div class="section output-container">
            <div class="section-title">Ответ</div>
            <textarea id="output" readonly placeholder="Ответ API будет здесь"></textarea>
        </div>
    </div>

    <script>
        const BASE_URL = 'https://api.green-api.com';

        function getCredentials() {
            const idInstance = document.getElementById('idInstance').value.trim();
            const apiTokenInstance = document.getElementById('apiTokenInstance').value.trim();

            if (!idInstance) {
                alert('Пожалуйста, введите idInstance');
                return null;
            }
            if (!apiTokenInstance) {
                alert('Пожалуйста, введите ApiTokenInstance');
                return null;
            }

            return { idInstance, apiTokenInstance };
        }

        function displayOutput(data) {
            const output = document.getElementById('output');
            output.value = JSON.stringify(data, null, 2);
        }

        function hideAllForms() {
            document.getElementById('sendMessageForm').classList.remove('active');
            document.getElementById('sendFileByUrlForm').classList.remove('active');
        }

        function formatPhone(phone) {
            return phone.replace(/\D/g, '') + '@c.us';
        }

        async function callGetSettings() {
            const creds = getCredentials();
            if (!creds) return;

            hideAllForms();

            try {
                const response = await fetch(
                    `${BASE_URL}/waInstance${creds.idInstance}/getSettings/${creds.apiTokenInstance}`
                );
                const data = await response.json();
                displayOutput(data);
            } catch (error) {
                alert('Ошибка: ' + error.message);
            }
        }

        async function callGetStateInstance() {
            const creds = getCredentials();
            if (!creds) return;

            hideAllForms();

            try {
                const response = await fetch(
                    `${BASE_URL}/waInstance${creds.idInstance}/getStateInstance/${creds.apiTokenInstance}`
                );
                const data = await response.json();
                displayOutput(data);
            } catch (error) {
                alert('Ошибка: ' + error.message);
            }
        }

        function showSendMessageForm() {
            hideAllForms();
            document.getElementById('sendMessageForm').classList.add('active');
        }

        async function callSendMessage() {
            const creds = getCredentials();
            if (!creds) return;

            const phone = document.getElementById('messagePhone').value.trim();
            const message = document.getElementById('messageText').value.trim();

            if (!phone) {
                alert('Пожалуйста, введите номер телефона');
                return;
            }
            if (!message) {
                alert('Пожалуйста, введите текст сообщения');
                return;
            }

            try {
                const response = await fetch(
                    `${BASE_URL}/waInstance${creds.idInstance}/sendMessage/${creds.apiTokenInstance}`,
                    {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            chatId: formatPhone(phone),
                            message: message
                        })
                    }
                );
                const data = await response.json();
                displayOutput(data);
            } catch (error) {
                alert('Ошибка: ' + error.message);
            }
        }

        function showSendFileByUrlForm() {
            hideAllForms();
            document.getElementById('sendFileByUrlForm').classList.add('active');
        }

        async function callSendFileByUrl() {
            const creds = getCredentials();
            if (!creds) return;

            const phone = document.getElementById('filePhone').value.trim();
            const url = document.getElementById('fileUrl').value.trim();
            const fileName = document.getElementById('fileName').value.trim();

            if (!phone) {
                alert('Пожалуйста, введите номер телефона');
                return;
            }
            if (!url) {
                alert('Пожалуйста, введите URL файла');
                return;
            }
            if (!fileName) {
                alert('Пожалуйста, введите имя файла');
                return;
            }

            try {
                const response = await fetch(
                    `${BASE_URL}/waInstance${creds.idInstance}/sendFileByUrl/${creds.apiTokenInstance}`,
                    {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            chatId: formatPhone(phone),
                            url: url,
                            fileName: fileName
                        })
                    }
                );
                const data = await response.json();
                displayOutput(data);
            } catch (error) {
                alert('Ошибка: ' + error.message);
            }
        }
    </script>
</body>
</html>
